name: Keep backend warm

# Pings the backend health endpoint on a schedule so the free-tier service
# (and its database connection) never goes cold — users don't hit 30s+ wake-ups.
on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health/
        run: |
          curl -fsS --max-time 90 --retry 4 --retry-delay 15 \
            https://cbc-backend-production-8bc4.up.railway.app/api/health/ \
            && echo "warm" || echo "ping failed (will retry next run)"
