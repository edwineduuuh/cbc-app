[phases.setup]
nixPkgs = ["tesseract", "poppler_utils", "python312"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --no-input", "python manage.py migrate"]

[start]
cmd = "gunicorn backend.wsgi:application --timeout 120 --workers 2"
